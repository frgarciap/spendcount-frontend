<div class="flex h-screen bg-[#F2F3F4] overflow-hidden">

  <!-- Desktop Sidebar -->
  <aside class="hidden md:flex md:flex-shrink-0 w-64">
    <app-sidebar (closeSidebar)="closeSidebar()" />
  </aside>

  <!-- Mobile Sidebar Overlay -->
  @if (sidebarOpen()) {
    <div class="fixed inset-0 z-40 md:hidden">
      <div class="absolute inset-0 bg-black/50" (click)="closeSidebar()"></div>
      <aside class="absolute left-0 top-0 h-full w-64 z-50">
        <app-sidebar (closeSidebar)="closeSidebar()" />
      </aside>
    </div>
  }

  <!-- Main Content -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

    <!-- Mobile Header -->
    <header class="md:hidden flex items-center justify-between px-4 py-3 bg-[#1C2833] border-b border-white/10">
      <button (click)="toggleSidebar()" class="text-white p-1.5 rounded-lg hover:bg-white/10">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-lg bg-[#D4A017] flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-[#1C2833]" viewBox="0 0 24 24" fill="currentColor">
            <path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>
          </svg>
        </div>
        <span class="text-white font-bold text-base">SpendCount</span>
      </div>
      <div class="w-8"></div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto pb-20 md:pb-0">
      <router-outlet />
    </main>

    <!-- Mobile Bottom Navigation -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-[#1C2833] border-t border-white/10 z-30">
      <div class="flex items-center justify-around py-2">

        @if (isAdmin()) {
          <!-- Admin nav -->
          <a routerLink="/admin/users" routerLinkActive="text-[#D4A017]"
            [routerLinkActiveOptions]="{ exact: false }"
            class="flex flex-col items-center gap-1 px-4 py-1.5 text-white/50 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            <span class="text-xs font-medium">Usuarios</span>
          </a>
          <a routerLink="/admin/roles" routerLinkActive="text-[#D4A017]"
            [routerLinkActiveOptions]="{ exact: false }"
            class="flex flex-col items-center gap-1 px-4 py-1.5 text-white/50 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
            </svg>
            <span class="text-xs font-medium">Roles</span>
          </a>

        } @else {
          <!-- User nav -->
          <a routerLink="/transactions" routerLinkActive="text-[#D4A017]"
            [routerLinkActiveOptions]="{ exact: false }"
            class="flex flex-col items-center gap-1 px-4 py-1.5 text-white/50 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M3 14h18M7 6l-4 4 4 4M17 6l4 4-4 4"/>
            </svg>
            <span class="text-xs font-medium">Movimientos</span>
          </a>
          <a routerLink="/reports" routerLinkActive="text-[#D4A017]"
            [routerLinkActiveOptions]="{ exact: false }"
            class="flex flex-col items-center gap-1 px-4 py-1.5 text-white/50 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            <span class="text-xs font-medium">Reportes</span>
          </a>
          <a routerLink="/coach" routerLinkActive="text-[#D4A017]"
            [routerLinkActiveOptions]="{ exact: false }"
            class="flex flex-col items-center gap-1 px-4 py-1.5 text-white/50 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
            </svg>
            <span class="text-xs font-medium">Coach IA</span>
          </a>
        }

      </div>
    </nav>

  </div>
</div>
